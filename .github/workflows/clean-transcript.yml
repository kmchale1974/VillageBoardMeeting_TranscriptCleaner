name: Clean Transcript V2

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run cleaner
        run: |
          python scripts/clean_transcript.py \
            input/meeting.json \
            output/cleaned-meeting.json \
            output/correction-log.json \
            output/error-report.txt \
            config

      - name: Convert to CSV
        run: |
          python scripts/json_to_csv.py \
            output/cleaned-meeting.json \
            output/cleaned-meeting.csv

      - name: Validate
        run: |
          python scripts/validate_output.py \
            input/meeting.json \
            output/cleaned-meeting.json \
            output/cleaned-meeting.csv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-transcript-v2
          path: output/
