name: Clean Transcript

on:
  workflow_dispatch:

jobs:

  clean:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clean transcript
        run: |
          python scripts/clean_transcript.py input/meeting.json output/cleaned.json

      - name: Convert to CSV
        run: |
          python scripts/json_to_csv.py output/cleaned.json output/cleaned.csv

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-transcript
          path: output/
